<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод параметров отчёта</title>
    <link rel="stylesheet" href="{{ url_for('bp_report.static', filename='css/report.css') }}">
</head>
<body>
    <div class="container">
        <h1>Формирование отчёта #{{ report_id }}</h1>
        
        <div class="form-container">
            <div class="query-info">
                <h3>Ввод параметров отчёта</h3>
                <p>Пожалуйста, укажите параметры для формирования отчёта</p>
            </div>

            <form class="query-form" method="POST" 
                  action="{% if report_id < 6 %}{{ url_for('bp_report.report_create_handler') }}{% else %}{{ url_for('bp_report.report_view_handler') }}{% endif %}">
                <div class="form-group">
                    <label for="year">Год *</label>
                    <input type="number" 
                           id="year" 
                           name="year"
                           class="form-input" 
                           placeholder="Введите год (например: 2024)" 
                           min="2000" 
                           max="2030" 
                           required>
                    <div class="input-hint">Диапазон: 2000-2030</div>
                </div>

                <div class="form-group">
                    <label for="month">Месяц *</label>
                    <select id="month" name="month" class="form-input" required>
                        <option value="">Выберите месяц</option>
                        <option value="1">Январь</option>
                        <option value="2">Февраль</option>
                        <option value="3">Март</option>
                        <option value="4">Апрель</option>
                        <option value="5">Май</option>
                        <option value="6">Июнь</option>
                        <option value="7">Июль</option>
                        <option value="8">Август</option>
                        <option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option>
                        <option value="11">Ноябрь</option>
                        <option value="12">Декабрь</option>
                    </select>
                </div>

                <input type="hidden" name="report_id" value="{{ report_id }}">

                <div class="form-buttons">
                    <button type="submit" class="btn btn-submit">
                        <span class="btn-icon">
                            {% if report_id < 6 %}📊{% else %}👁️{% endif %}
                        </span>
                        <span class="btn-text">
                            {% if report_id < 6 %}Сформировать отчёт{% else %}Просмотреть отчёт{% endif %}
                        </span>
                    </button>
                    <a href="{{ url_for('bp_report.report_menu_handler') }}" class="btn btn-back-form">
                        <span class="btn-icon">←</span>
                        <span class="btn-text">Назад</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
